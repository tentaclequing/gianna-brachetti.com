{{- $page := . -}} {{- $status := $page.Params.status | default "settled" -}}
<div class="fragment-card">
  <span
    class="fragment-status {{ $status }}"
    aria-label="Status: {{ $status }}"
  >
    <span class="fragment-dot" aria-hidden="true"></span>
  </span>
  <a class="fragment-title" href="/notes/#{{ $page.File.ContentBaseName }}"
    >{{ $page.Title }}</a
  >
  <p class="fragment-body">
    {{- if $page.Params.description -}} {{ $page.Params.description }} {{- else
    -}} {{ $page.Plain | truncate 160 }} {{- end -}}
  </p>
</div>
