baseURL = "https://gianna-brachetti.com/"
title = "~/gianna"
theme = "signal-noise"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
ignoreFiles = ['content/Archive']

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
  [languages.de]
    languageCode = "de"
    languageName = "Deutsch"
    weight = 2
    contentDir = "content/de"

[[module.mounts]]
  source = "content"
  target = "content"
  excludeFiles = ["Archive/**"]

[taxonomies]
  tag = "tags"

[permalinks]
  [permalinks.page]
    writing = "/writing/:slug/"
    notes = "/notes/:slug/"
  [permalinks.section]
    writing = "/writing/"
    notes = "/notes/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.goldmark.extensions]
    strikethrough = true
    table = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "index"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[params]
  description = "Product management, organic growth, and sharp observations at the intersection of search, AI, and security."
  author = "Gianna Brachetti-Truskawa"
  email = "hello@gianna-brachetti.com"
  github = "https://github.com/tentaclequing"
  linkedin = "https://www.linkedin.com/in/gianna-brachetti-truskawa/"
